  <script>
    (function() {
      if (!window || window.__customerDevServerReloadGuard) return;
      window.__customerDevServerReloadGuard = true;

      const OriginalWebSocket = window.WebSocket;
      const OriginalEventSource = window.EventSource;
      const shouldSuppress = (payload) => {
        try {
          if (typeof payload !== 'string') return false;
          const text = payload.toLowerCase();
          return text.includes('reload') || text.includes('refresh') || text.includes('livereload') || text.includes('live-reload');
        } catch (err) {
          return false;
        }
      };

      if (OriginalWebSocket) {
        const WrappedWebSocket = function(url, protocols) {
          const socket = new OriginalWebSocket(url, protocols);
          const originalAddEventListener = socket.addEventListener.bind(socket);

          socket.addEventListener = function(type, handler, options) {
            if (type === 'message' && typeof handler === 'function') {
              return originalAddEventListener('message', function(event) {
                if (shouldSuppress(event.data)) {
                  console.debug('[customer] suppressed dev-server reload message', event.data);
                  return;
                }
                handler(event);
              }, options);
            }
            return originalAddEventListener(type, handler, options);
          };

          Object.defineProperty(socket, 'onmessage', {
            get() {
              return this._onmessage;
            },
            set(fn) {
              if (typeof fn === 'function') {
                this._onmessage = function(event) {
                  if (shouldSuppress(event.data)) {
                    console.debug('[customer] suppressed dev-server reload message', event.data);
                    return;
                  }
                  fn(event);
                };
              } else {
                this._onmessage = fn;
              }
            }
          });

          return socket;
        };

        try {
          WrappedWebSocket.prototype = OriginalWebSocket.prototype;
          Object.keys(OriginalWebSocket).forEach((key) => {
            try { WrappedWebSocket[key] = OriginalWebSocket[key]; } catch (e) {}
          });
          window.WebSocket = WrappedWebSocket;
        } catch (e) {
          console.debug('[customer] failed to wrap WebSocket', e);
        }
      }

      if (OriginalEventSource) {
        const WrappedEventSource = function(url, config) {
          const source = new OriginalEventSource(url, config);
          const originalAddEventListener = source.addEventListener.bind(source);

          source.addEventListener = function(type, handler, options) {
            if (type === 'message' && typeof handler === 'function') {
              return originalAddEventListener('message', function(event) {
                if (shouldSuppress(event.data)) {
                  console.debug('[customer] suppressed dev-server reload SSE', event.data);
                  return;
                }
                handler(event);
              }, options);
            }
            return originalAddEventListener(type, handler, options);
          };

          return source;
        };

        try {
          WrappedEventSource.prototype = OriginalEventSource.prototype;
          window.EventSource = WrappedEventSource;
        } catch (e) {
          console.debug('[customer] failed to wrap EventSource', e);
        }
      }
    })();
  </script>
