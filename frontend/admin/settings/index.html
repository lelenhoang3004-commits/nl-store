<section class="settings-page" aria-labelledby="settings-title">
  <header class="settings-heading">
    <div>
      <p class="settings-eyebrow">Cài đặt hệ thống</p>
      <h1 id="settings-title">Cài đặt</h1>
      <p>Quản lý cấu hình vận hành cửa hàng bằng dữ liệu giả, chưa kết nối Backend.</p>
    </div>
    <div class="settings-status">
      <i class="fa-solid fa-circle-check" aria-hidden="true"></i>
      <span>Local draft</span>
    </div>
  </header>

  <div class="settings-shell">
    <aside class="settings-tabs" aria-label="Nhóm cài đặt" data-settings-tabs></aside>

    <section class="settings-content">
      <div class="settings-content-header">
        <div>
          <p data-settings-active-eyebrow>Tổng quan</p>
          <h2 data-settings-active-title>Tổng quan</h2>
        </div>
        <button class="settings-save-button" type="button" data-settings-save>
          <i class="fa-regular fa-floppy-disk" aria-hidden="true"></i>
          <span>Lưu thay đổi</span>
        </button>
      </div>

      <form class="settings-form" data-settings-form></form>
    </section>
  </div>
</section>
